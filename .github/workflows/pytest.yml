name: OAF Server Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure testing packages are installed even if requirements_dev.txt wasn't used globally
        pip install pytest pytest-asyncio pytest-mock pytest-cov httpx
        
    - name: Test with pytest
      run: |
        # Set PYTHONPATH so 'src' is importable from the project root
        export PYTHONPATH="${GITHUB_WORKSPACE}"
        export OAF_TESTING=1
        export OPENAI_API_KEY="sk-dummy"
        export GEMINI_API_KEY="dummy"
        pytest --cov=src --cov-report=xml
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: AURAxLab/OpenVirtualAgentFramework-Server
